name: Update submodule pointers

on:
  repository_dispatch:
    types: [submodule-main-updated]
  workflow_dispatch:
    inputs:
      submodule_path:
        description: Submodule path to update
        required: true
        type: choice
        options:
          - bidly-backend/bidly-backend-auth
          - bidly-backend/bidly-backend-aunction
          - bidly-frontend/bidly-frontend-auth
          - bidly-frontend/bidly-frontend-aunction
          - bidly-argo-cd

permissions:
  contents: write

concurrency:
  group: submodule-pointer-updates
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      SUBMODULE_PATH: ${{ github.event.client_payload.submodule_path || inputs.submodule_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.BIDLY_ROOT_DISPATCH_TOKEN }}

      - name: Verify submodule path
        run: |
          case "$SUBMODULE_PATH" in
            bidly-backend/bidly-backend-auth|bidly-backend/bidly-backend-aunction|bidly-frontend/bidly-frontend-auth|bidly-frontend/bidly-frontend-aunction|bidly-argo-cd) ;;
            *) echo "Unsupported submodule path: $SUBMODULE_PATH" >&2; exit 1 ;;
          esac

      - name: Update all pointers to latest main
        run: git submodule update --init --remote --recursive

      - name: Commit and push pointer updates
        run: |
          if git diff --quiet -- bidly-backend bidly-frontend bidly-argo-cd; then
            echo "Already points to the latest main commits."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bidly-backend bidly-frontend bidly-argo-cd
          git commit -m "chore: update submodules"
          for attempt in 1 2 3; do
            git push origin HEAD:main && exit 0
            git pull --rebase origin main
          done
          exit 1
